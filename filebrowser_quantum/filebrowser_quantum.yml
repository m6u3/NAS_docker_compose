services:
  #########################
  # Filebrowser Quantum   #
  #########################
  filebrowser:
    image: gtstef/filebrowser:stable
    container_name: filebrowser-quantum
    environment:
      FILEBROWSER_DATABASE: "/config/db/database.db"
      FILEBROWSER_CONFIG: "/config/data/config.yaml"
      FILEBROWSER_ADMIN_PASSWORD: "${FB_PASSWORD}"
      TZ: ${TZ_NY}
    volumes:
      - ${PATH_TO_DATA}/personal-data:/folder
