# jellyfin
# Media Share application
#########################
# General Info          #
#########################
#Jellyfin with CF Tunnel

#########################
# Logging               #
#########################
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:

  #########################
  # Jellyfin              #
  #########################
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    group_add:
      - "44"   # Host 'video' group
      - "105"  # Host 'render' group
    environment:
      - PUID=${DOCKER_USER_PUID}
      - PGID=${DOCKER_USER_PGID}
      - TZ=${TZ_NY}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, video, compute]  
    volumes:
      - ${PATH_TO_SSD_APPDATA}/jellyfin/library:/config
      - ${PATH_TO_DATA}/media/series:/tvshows
      - ${PATH_TO_DATA}/media/movies:/movies
      - ${PATH_TO_DATA}/personal-data/pictures:/photos
      - ${PATH_TO_DATA}/personal-data/videos:/videos
      - ${PATH_TO_DATA}/media/music:/music
      - ${PATH_TO_DATA}/media/books:/books
      - ${PATH_TO_DATA}/media/live-tv:/live-tv
    ports:
      - 8096:8096
    logging: *default-logging
    restart: unless-stopped
