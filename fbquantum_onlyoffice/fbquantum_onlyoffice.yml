services:
  #########################
  # FILEBROWSER QUANTUM   #
  #########################
  filebrowser:
    image: gtstef/filebrowser:stable
    container_name: filebrowser-quantum
    user: ${DOCKER_USER_PUID}:${DOCKER_USER_PGID}
    restart: unless-stopped
    ports:
      - 8083:80
    volumes:
      - ${DATA}:/srv
      - ${PATH_TO_SSD_APPDATA}/filebrowser:/config
      - ${PATH_TO_SSD_APPDATA}/filebrowser/tmp:/tmp
    environment:
      - FILEBROWSER_DATABASE=/config/db/database.db
      - FILEBROWSER_CONFIG=/config/config.yaml
      - PUID=${DOCKER_USER_PUID}
      - PGID=${DOCKER_USER_PGID}
    networks:
      - office-network
      - cf_tunnel_network 
  #########################
  #     ONLY OFFICE       #
  #########################
  onlyoffice:
    image: onlyoffice/documentserver:latest
    container_name: onlyoffice
    restart: unless-stopped
    environment:
      - JWT_ENABLED=true
      - JWT_SECRET=${JWT_SECRET}
      - ALLOW_PRIVATE_IP_ADDRESS=false
      - JWT_HEADER=Authorization
    security_opt:
      - apparmor:unconfined
    privileged: true
    networks:
      - office-network
      - cf_tunnel_network 
    ports:
      - 9000:80
