# duplicati
# Backup improtant data to cloud
services:
  duplicati:
    image: lscr.io/linuxserver/duplicati:latest
    container_name: duplicati
    environment:
      - PUID=${DOCKER_USER_PUID}
      - PGID=${DOCKER_USER_PGID}
      - TZ=${TZ_NY}
      - SETTINGS_ENCRYPTION_KEY=${DUPLICATI_ENCRYPTION_KEY}
      - DOCKER_MODS=linuxserver/mods:universal-docker-cli
      # - CLI_ARGS=--webservice-password=admin --webservice-disable-signin-tokens=true
    volumes:
      - ${PATH_TO_SSD_APPDATA}/duplicati:/config
      - ${PATH_TO_SSD_APPDATA}/actual_budget:/source/actual_budget
      - ${PATH_TO_DATA}/personal-data:/source/personal-data
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - 8200:8200
    restart: unless-stopped

