# arr_stack
# 
#########################
# General Info          #
#########################
#Arr Stack for RoloVault
#VPN NordVPN (only used for Qbit)
#Acess: Local Only
# Services: Gluetun, QBit Torrent, Sonnar, Radarr, Lidarr

#########################
# Logging               #
#########################
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"


#########################
# Services              #
#########################
services:
  #########################
  # Gluetun               #
  #########################
  gluetun:
    image: qmcgaw/gluetun
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - VPN_SERVICE_PROVIDER=protonvpn
      - VPN_TYPE=wireguard
      - WIREGUARD_PRIVATE_KEY=${PROTONVPN_KEY}
      - VPN_PORT_FORWARDING=on
      - SERVER_COUNTRIES=United States
      - UPDATER_PROTONVPN_EMAIL=${PROTON_EMAIL}
      - UPDATER_PROTONVPN_PASSWORD=${PROTON_PASSWORD}
    ports:
      - 8080:8080 #qbittorrent
      - 6881:6881/udp #qbittorrent
      - 9696:9696 #prowlarr
      - 7878:7878 #radarr
      - 8989:8989 #sonarr
      - 8686:8686 #lidarr
      - 5299:5299 #lazylibrarian
      - 6767:6767 #bazarr
      - 3000:3000 # http firefox
      - 3001:3001 # https firefox
      - 8265:8265 # Tdarr WebUI
      - 8266:8266 # Tdarr Server
    volumes:
      - ${PATH_TO_SSD_APPDATA}/gluetun:/gluetun
    restart: unless-stopped
      
  #########################
  # QbitTorrent           #
  #########################
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    network_mode: "service:gluetun"
    environment:
      - PUID=${DOCKER_USER_PUID}
      - PGID=${DOCKER_USER_PGID}
      - TZ=E${TZ_NY}
      - WEBUI_PORT=8080
    volumes:
      - ${PATH_TO_SSD_APPDATA}/qbittorrent:/config
      - ${PATH_TO_DATA}/downloads:/downloads #optional
    restart: unless-stopped

  #########################
  # Prowlarr              #
  #########################
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    network_mode: "service:gluetun"
    environment:
      - PUID=${DOCKER_USER_PUID}
      - PGID=${DOCKER_USER_PGID}
      - TZ=${TZ_NY}
    volumes:
      - ${PATH_TO_SSD_APPDATA}/prowlarr:/config
    logging: *default-logging
    restart: unless-stopped

  #########################
  # Radarr                #
  #########################
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    network_mode: "service:gluetun"
    environment:
      - PUID=${DOCKER_USER_PUID}
      - PGID=${DOCKER_USER_PGID}
      - TZ=${TZ_NY}
    volumes:
      - ${PATH_TO_SSD_APPDATA}/radarr:/config
      - ${PATH_TO_DATA}/media/movies:/movies
      - ${PATH_TO_DATA}/downloads:/downloads
    logging: *default-logging
    restart: unless-stopped

  #########################
  # Sonnar                #
  #########################
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    network_mode: "service:gluetun"
    environment:
      - PUID=${DOCKER_USER_PUID}
      - PGID=${DOCKER_USER_PGID}
      - TZ=${TZ_NY}
    volumes:
      - ${PATH_TO_DATA}/appdata/sonarr:/config
      - ${PATH_TO_DATA}/media/series:/tvshows
      - ${PATH_TO_DATA}/downloads:/downloads
    logging: *default-logging
    restart: unless-stopped

  #########################
  # Lidarr               #
  #########################
  lidarr:
    image: lscr.io/linuxserver/lidarr:latest
    container_name: lidarr
    network_mode: "service:gluetun"
    environment:
      - PUID=${DOCKER_USER_PUID}
      - PGID=${DOCKER_USER_PGID}
      - TZ=${TZ_NY}
    volumes:
      - ${PATH_TO_DATA}/appdata/lidarr:/config
      - ${PATH_TO_DATA}/media/music:/music
      - ${PATH_TO_DATA}/downloads:/downloads
    logging: *default-logging
    restart: unless-stopped

  #########################
  # LazyLibrarian         #
  #########################
  lazylibrarian:
    image: lscr.io/linuxserver/lazylibrarian:latest
    container_name: lazylibrarian
    network_mode: "service:gluetun"
    environment:
      - PUID=${DOCKER_USER_PUID}
      - PGID=${DOCKER_USER_PGID}
      - TZ=${TZ_NY}
      - DOCKER_MODS=linuxserver/mods:universal-calibre|linuxserver/mods:lazylibrarian-ffmpeg #optional
    volumes:
      - ${PATH_TO_SSD_APPDATA}/lazylibrarian:/config
      - ${PATH_TO_DATA}/downloads/:/downloads
      - ${PATH_TO_DATA}/media/books:/books #optional
    restart: unless-stopped

  #########################
  # Bazarr                #
  #########################
  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    network_mode: "service:gluetun"
    environment:
      - PUID=${DOCKER_USER_PUID}
      - PGID=${DOCKER_USER_PGID}
      - TZ=${TZ_NY}
    volumes:
      -  ${PATH_TO_SSD_APPDATA}/bazarr:/config
      -  ${PATH_TO_DATA}/media/movies:/movies #optional
      -  ${PATH_TO_DATA}/media/series:/tvshows #optional
    restart: unless-stopped

  #########################
  # Tdarr                #
  #########################

  tdarr:
    image: ghcr.io/haveagitgat/tdarr:latest
    container_name: tdarr
    # Remove the ports: section from here
    network_mode: "service:gluetun" 
    depends_on:
      - gluetun
    devices:
      - /dev/dri:/dev/dri
    group_add:
     - "44"
     - "105"
    environment:
      - PUID=${DOCKER_USER_PUID}
      - PGID=${DOCKER_USER_PGID}
      - TZ=${TZ_NY}
      - serverIP=127.0.0.1 # Crucial: Use localhost when behind Gluetun
      - serverPort=8266
      - webUIPort=8265
      - internalNode=true
      - nodeID=MainNode
    volumes:
      - ${PATH_TO_SSD_APPDATA}/tdarr/server:/app/server
      - ${PATH_TO_SSD_APPDATA}/tdarr/configs:/app/configs
      - ${PATH_TO_SSD_APPDATA}/tdarr/logs:/app/logs
      - ${PATH_TO_SSD_APPDATA}/tdarr/transcode_temp:/temp
      - ${PATH_TO_DATA}/media:/media  

  #########################
  # Firefox               #
  #########################
  firefox:
    image: lscr.io/linuxserver/firefox
    network_mode: "service:gluetun"
    container_name: firefox
    environment:
      - PUID=${DOCKER_USER_PUID}
      - PGID=${DOCKER_USER_PGID}
      - TZ=${TZ_NY}
      #- FIREFOX_CLI=https://www.linuxserver.io/ #optional
    volumes:
      - ${PATH_TO_SSD_APPDATA}/firefox/config:/config
      - ${PATH_TO_DATA}/downloads/firefox:/downloads
    shm_size: "1gb"
    restart: unless-stopped
